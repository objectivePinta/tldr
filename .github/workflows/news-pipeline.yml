name: AI News Pipeline

on:
  workflow_dispatch:
  schedule:
	- cron: '0 6,11,16 * * *'

permissions:
  contents: write

jobs:
  autopublish:
	runs-on: ubuntu-latest
	steps:
	  - name: Checkout
		uses: actions/checkout@v4

	  - name: Setup Node
		uses: actions/setup-node@v4
		with:
		  node-version: 22
		  cache: npm

	  - name: Install dependencies
		run: npm ci

	  - name: Run AI news pipeline
		env:
		  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
		  OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
		  SITE_URL: https://objectivepinta.github.io/tldr/
		run: node scripts/news-pipeline.js --max-items=8 --commit


